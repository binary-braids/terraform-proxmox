name: Host 02 Production CD

on:
  workflow_dispatch: 
  pull_request:
    paths-ignore:
      - .github/**
    branches:
      - main
    
permissions:
  contents: write
  issues: write

env:
  FILE_PATH: "./production/host_02"

jobs:
  init_and_plan:
    name: Terraform Init and Plan
    runs-on: Self-Hosted

    outputs:
      planExitcode: ${{ steps.terraformPlan.outputs.exitcode }}

    steps:

      - name: Checkout 🔔
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Map Secrets to Environment Variables 🗺️ 
        uses: oNaiPs/secrets-to-env-action@ec46a22bfc9b37e014b627b3208b07eb8909ea0f # v1.5
        with:
            secrets: ${{ toJSON(secrets) }}        

      - name: Replace Tokens 🪙
        uses: cschleiden/replace-tokens@4d5a042c84c3568b3858b7af9394923d2d5195c9 # v1.3
        with:
          files: '["${{ env.FILE_PATH }}/**/*"]'

      - name: Install Terraform ⛰️
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Terraform Init 🏃
        id: terraformInit
        run: terraform init
        working-directory: ${{ env.FILE_PATH }}

      - name: Terraform Plan 🗺️
        id: terraformPlan
        run: |
          terraform plan -input=false -out ${{ github.sha }}.tfplan -detailed-exitcode 
        working-directory: ${{ env.FILE_PATH }}

      - name: Cache Terraform Plan 📦
        uses: actions/cache/save@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          path: ${{ env.FILE_PATH }}/**
          key: ${{ github.sha }}

  apply:
    name: Terraform Apply
    needs:
      - init_and_plan
    if: needs.init_and_plan.outputs.planExitcode == 2
    runs-on: Self-Hosted
    environment: "Host 02 Production"

    steps:

      - name: Checkout 🔔
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Restore Terraform Plan 🗺️
        uses: actions/cache/restore@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          path: ${{ env.FILE_PATH }}/**
          key: ${{ github.sha }}

      - name: Install Terraform ⛰️
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Terraform Apply 🚀
        run: terraform apply ${{ github.sha }}.tfplan
        working-directory: ${{ env.FILE_PATH }}

